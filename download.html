<!DOCTYPE html>

<title>BPWMC资源中心</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Helvetica Neue",
    Arial;

    color:#1d1d1f;

    background:transparent;

    min-height:100vh;

    padding:50px;

    overflow-x:hidden;

}


/* 流体背景 */

.fluid-bg{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;


    z-index:0;

    overflow:hidden;

    background:#fbfbfd;

}



.blob{

    position:absolute;

    z-index:1;

    border-radius:50%;

    filter:blur(90px);

    opacity:.8;

    animation:move 18s infinite alternate;

}

.blob1{

    width:500px;

    height:500px;

    background:#007aff;

    top:-150px;

    left:-100px;

}


.blob2{

    width:450px;

    height:450px;

    background:#af52de;

    right:-100px;

    top:100px;

}



.blob3{

    width:400px;

    height:400px;

    background:#ff2d55;

    bottom:-100px;

    left:200px;

}



.blob4{

    width:350px;

    height:350px;

    background:#ffcc00;

    right:200px;

    bottom:-100px;

}



@keyframes move{

0%{

transform:translate(0,0);

}


100%{

transform:

translate(120px,100px)
scale(1.2);

}

}



/* 标题 */


h1{
    color:white;
    text-shadow:
    0 10px 40px rgba(0,0,0,.35);
    
    position:relative;

    z-index:2;

    text-align:center;

    font-size:60px;

    font-weight:900;

}


/* 内容区域 */

.box{

    position:relative;

    z-index:2;

    max-width:900px;

    margin:60px auto;

}


/* 玻璃卡片 */

.card{

    opacity:0;


    animation:

    bounceIn .9s cubic-bezier(.34,1.56,.64,1) forwards;



    background:

    rgba(255,255,255,.35);



    backdrop-filter:

    blur(25px);



    -webkit-backdrop-filter:

    blur(25px);



    border:

    1px solid rgba(255,255,255,.5);



    padding:35px;

    margin:25px 0;

    border-radius:35px;


    box-shadow:

    0 20px 60px rgba(0,0,0,.12);


    display:flex;

    justify-content:space-between;

    align-items:center;

}



/* 下载按钮 */


button{


background:

rgba(255,255,255,.45);



border:

1px solid rgba(255,255,255,.7);



padding:14px 35px;



border-radius:40px;



box-shadow:

inset 0 0 20px rgba(255,255,255,.5),

0 10px 30px rgba(0,0,0,.15);



transition:.3s;


}



button{

transition:.35s;

}


button:hover{


transform:

translateY(-8px)
scale(1.08);


box-shadow:

0 20px 50px rgba(0,0,0,.2);

}


transform:

translateY(-5px)
scale(1.05);


}



a{

text-decoration:none;

color:#1d1d1f;

font-weight:600;

}
/* 页面进入动画 */

@keyframes bounceIn{

0%{

opacity:0;

transform:

translateY(80px)
scale(.8);

}


60%{

opacity:1;

transform:

translateY(-15px)
scale(1.05);

}


80%{

opacity:1;

transform:

translateY(5px)
scale(.98);

}


100%{

opacity:1;

transform:

translateY(0)
scale(1);

}

}



/* 标题进入 */

h1{

animation:

bounceIn 1s cubic-bezier(.34,1.56,.64,1);

}



/* 卡片进入 */

.card{

animation:

bounceIn .9s cubic-bezier(.34,1.56,.64,1);

}



/* 每个卡片延迟 */

.card:nth-child(1){

animation-delay:.15s;

}


.card:nth-child(2){

animation-delay:.3s;

}


.card:nth-child(3){

animation-delay:.45s;

}

</style>

</head>
