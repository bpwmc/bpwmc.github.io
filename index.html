<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>别碰我蜜茶</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Helvetica Neue",
    Arial,
    sans-serif;

    background:#fbfbfd;

    color:#1d1d1f;

    overflow-x:hidden;

}


/* 背景光 */

body::before{

    content:"";

    position:fixed;

    width:600px;

    height:600px;

    background:
    radial-gradient(circle,
    rgba(0,122,255,.18),
    transparent 70%);

    top:-200px;

    left:-200px;

    z-index:-1;

}



/* 主容器 */

.container{

    max-width:1100px;

    margin:auto;

    padding:40px 30px;

}



/* 首页 */

.hero{

    text-align:center;

    padding:100px 0;

    animation:fade 1s ease;

}



@keyframes fade{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}



/* 头像 */

.avatar{

    width:170px;

    height:170px;

    border-radius:50%;

    object-fit:cover;

    margin-bottom:40px;


    box-shadow:

    0 30px 70px rgba(0,0,0,.15);


    transition:.4s;

}



.avatar:hover{

    transform:

    scale(1.08)
    rotate(3deg);

}




/* 标题 */


h1{

    font-size:80px;

    letter-spacing:15px;

    font-weight:800;

}



.subtitle{

    margin-top:25px;

    font-size:26px;

    color:#6e6e73;

}

/* 液态玻璃按钮 */

.nav a{

    display:inline-block;

    position:relative;

    overflow:hidden;


    text-decoration:none;

    color:#1d1d1f;


    padding:18px 55px;

    margin:12px;


    border-radius:50px;



    /* 半透明玻璃 */

    background:

    linear-gradient(
        135deg,
        rgba(255,255,255,.45),
        rgba(255,255,255,.15)
    );



    backdrop-filter:

    blur(20px);



    -webkit-backdrop-filter:

    blur(20px);



    /* 玻璃边缘 */

    border:

    1px solid rgba(255,255,255,.6);



    box-shadow:

    0 15px 40px rgba(0,0,0,.15),

    inset 0 0 20px rgba(255,255,255,.35);



    font-size:18px;

    font-weight:600;


    transition:.4s;

}



/* 鼠标经过 */

.nav a:hover{


    transform:

    translateY(-8px)
    scale(1.08);



    box-shadow:

    0 25px 60px rgba(0,0,0,.25),

    inset 0 0 30px rgba(255,255,255,.6);

}



/* 按钮流光 */

.nav a::before{


    content:"";


    position:absolute;


    top:0;

    left:-120%;


    width:80%;

    height:100%;



    background:

    linear-gradient(

    120deg,

    transparent,

    rgba(255,255,255,.8),

    transparent

    );


    transform:skewX(-25deg);



    transition:.6s;


}



.nav a:hover::before{


    left:150%;


}





/* 内容卡片 */


.card{


    background:

    rgba(255,255,255,.75);


    backdrop-filter:blur(20px);


    border-radius:40px;


    padding:70px;


    margin-top:60px;


    box-shadow:

    0 30px 80px rgba(0,0,0,.08);


    animation:fade 1.2s ease;

}




.card h2{

    font-size:45px;

    margin-bottom:30px;

}



.card p{

    color:#6e6e73;

    font-size:20px;

    line-height:2;

}





footer{


    text-align:center;


    margin:100px 0 40px;


    color:#86868b;


}





/* 点击星星 */

.star{


    position:fixed;


    pointer-events:none;


    user-select:none;


    z-index:99999;


    font-size:22px;


    animation:

    sparkle .8s ease-out forwards;


}



@keyframes sparkle{


from{


opacity:1;


transform:

translate(0,0)

scale(1);


}


to{


opacity:0;


transform:

translate(var(--x),var(--y))

scale(.1)

rotate(360deg);


}


}





/* 手机适配 */


@media(max-width:600px){
.liquid-title{

font-size:45px;

letter-spacing:6px;

}

.container{

padding:20px;

}



.hero{

padding:60px 0;

}



h1{

font-size:45px;

letter-spacing:8px;

}



.subtitle{

font-size:20px;

}



.avatar{

width:130px;

height:130px;

}



.card{

padding:35px;

}



.card h2{

font-size:32px;

}



.card p{

font-size:17px;

}



.nav a{

padding:15px 35px;

font-size:16px;

}


}
/* 流体背景 */

.fluid-bg{

    position:fixed;

    width:100%;

    height:100%;

    top:0;

    left:0;

    overflow:hidden;

    z-index:-2;

    background:#fbfbfd;

}



/* 彩色流体 */

.blob{

    position:absolute;

    border-radius:50%;

    filter:blur(80px);

    opacity:.65;

    animation:move 18s infinite alternate ease-in-out;

}



/* 蓝色 */

.blob1{

    width:500px;

    height:500px;

    background:#007aff;

    top:-150px;

    left:-100px;

}



/* 紫色 */

.blob2{

    width:450px;

    height:450px;

    background:#af52de;

    right:-100px;

    top:100px;

    animation-duration:22s;

}



/* 粉色 */

.blob3{

    width:400px;

    height:400px;

    background:#ff2d55;

    bottom:-100px;

    left:200px;

    animation-duration:25s;

}



/* 黄色 */

.blob4{

    width:350px;

    height:350px;

    background:#ffcc00;

    right:250px;

    bottom:-100px;

    animation-duration:20s;

}





@keyframes move{


0%{

transform:

translate(0,0)
scale(1);

}



50%{

transform:

translate(120px,80px)
scale(1.2);

}



100%{

transform:

translate(-80px,150px)
scale(.9);

}



}
.liquid-title{

    position:relative;

    font-size:80px;

    letter-spacing:12px;

    font-weight:900;


    color:white;


    background:

    linear-gradient(
        120deg,
        #ffffff 0%,
        rgba(255,255,255,.55) 35%,
        #ffffff 50%,
        rgba(255,255,255,.65) 70%,
        #ffffff 100%
    );


    background-size:200% auto;


    -webkit-background-clip:text;

    background-clip:text;


    -webkit-text-fill-color:transparent;



    /* 玻璃边缘 */

    -webkit-text-stroke:

    1.5px rgba(255,255,255,.85);



    /* 立体玻璃阴影 */

    text-shadow:

    0 0 15px rgba(255,255,255,.6),

    0 10px 30px rgba(0,0,0,.25),

    0 30px 70px rgba(0,0,0,.2);



    filter:

    drop-shadow(
    0 10px 20px rgba(0,0,0,.25)
    );



    animation:

    glassShine 6s infinite linear;

}
@keyframes glassShine{

0%{

background-position:
0% center;

}



50%{

background-position:
100% center;

}



100%{

background-position:
0% center;

}

}
</style>


</head>



<body>
<div class="fluid-bg">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="blob blob4"></div>
</div>


<div class="container">



<section class="hero">


<img

class="avatar"

src="微信图片_20251228180549_142_1.jpg"

alt="BPWMC头像">


<h1 class="liquid-title">
别碰我蜜茶
</h1>



<p class="subtitle">

Create · Record · Share

</p>



<div class="nav">


<a href="blog.html">

日志

</a>


<a href="download.html">

资源

</a>



</div>



</section>




<section class="card">


<h2>

Welcome

</h2>



<p>

欢迎来到 BPWMC 的个人空间。

</p>


<p>

记录想法，保存回忆，分享资源。

</p>



</section>





<footer>

© 2026 BPWMC

</footer>




</div>





<script>


document.addEventListener("click",function(e){


const icons=[

"✦",

"✧",

"⭐",

"✨"

];



for(let i=0;i<8;i++){



const star=document.createElement("div");


star.className="star";


star.textContent=

icons[Math.floor(Math.random()*icons.length)];



star.style.left=

e.clientX+"px";


star.style.top=

e.clientY+"px";



let angle=

Math.random()*Math.PI*2;



let distance=

30+Math.random()*70;



star.style.setProperty(

"--x",

Math.cos(angle)*distance+"px"

);



star.style.setProperty(

"--y",

Math.sin(angle)*distance+"px"

);



document.body.appendChild(star);



setTimeout(()=>{


star.remove();


},800);



}



});



</script>



</body>

</html>
