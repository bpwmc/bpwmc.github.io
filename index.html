<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BPWMC</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Helvetica Neue",
    Arial,
    sans-serif;

    background:#fbfbfd;
    color:#1d1d1f;

}


.container{

    max-width:1200px;

    margin:auto;

    padding:80px 30px;

}



/* 顶部 */


.hero{

    text-align:center;

    padding:120px 0;

}


.hero h1{

    font-size:96px;

    letter-spacing:12px;

    font-weight:700;

}


.hero p{

    margin-top:30px;

    font-size:26px;

    color:#6e6e73;

}




/* 导航 */


.nav{

    margin-top:60px;

}


.nav a{

    display:inline-block;

    margin:10px;

    padding:14px 32px;


    color:#1d1d1f;

    text-decoration:none;


    border-radius:30px;


    background:white;


    box-shadow:
    0 10px 30px rgba(0,0,0,.08);


    transition:.3s;

}



.nav a:hover{

    transform:translateY(-5px);

}





/* 内容 */


.section{


    margin-top:80px;


    background:white;


    border-radius:30px;


    padding:70px;


    box-shadow:

    0 20px 60px rgba(0,0,0,.06);


}



.section h2{

    font-size:42px;

    margin-bottom:25px;

}



.section p{

    font-size:20px;

    color:#6e6e73;

    line-height:2;

}





footer{

    text-align:center;

    margin-top:100px;

    color:#86868b;

}



</style>


</head>


<body>


<div class="container">



<section class="hero">


<h1>
BPWMC
</h1>


<p>
Create · Record · Share
</p>


<div class="nav">

<a href="#">
关于我
</a>


<a href="#">
日志
</a>


<a href="#">
相册
</a>


<a href="#">
资源
</a>


</div>


</section>




<section class="section">


<h2>
Welcome
</h2>


<p>
这是 BPWMC 的个人空间。
</p>


<p>
记录想法，保存回忆，分享资源。
</p>


</section>




<footer>

© 2026 BPWMC

</footer>



</div>


</body>

</html>
