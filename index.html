<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>别碰我蜜茶</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Helvetica Neue",
    Arial,
    sans-serif;

    background:#fbfbfd;

    color:#1d1d1f;

    overflow-x:hidden;

}


/* 背景光 */

body::before{

    content:"";

    position:fixed;

    width:600px;

    height:600px;

    background:
    radial-gradient(circle,
    rgba(0,122,255,.18),
    transparent 70%);

    top:-200px;

    left:-200px;

    z-index:-1;

}



/* 主容器 */

.container{

    max-width:1100px;

    margin:auto;

    padding:40px 30px;

}



/* 首页 */

.hero{

    text-align:center;

    padding:100px 0;

    animation:fade 1s ease;

}



@keyframes fade{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}



/* 头像 */

.avatar{

    width:170px;

    height:170px;

    border-radius:50%;

    object-fit:cover;

    margin-bottom:40px;


    box-shadow:

    0 30px 70px rgba(0,0,0,.15);


    transition:.4s;

}



.avatar:hover{

    transform:

    scale(1.08)
    rotate(3deg);

}




/* 标题 */


h1{

    font-size:80px;

    letter-spacing:15px;

    font-weight:800;

}



.subtitle{

    margin-top:25px;

    font-size:26px;

    color:#6e6e73;

}



/* 导航 */


.nav{

    margin-top:70px;

}



.nav a{


    display:inline-block;

    text-decoration:none;

    color:#1d1d1f;


    padding:18px 55px;


    margin:12px;


    border-radius:50px;


    background:

    rgba(255,255,255,.65);


    backdrop-filter:blur(20px);


    box-shadow:

    0 15px 40px rgba(0,0,0,.08);


    font-size:18px;


    transition:.35s;

}



.nav a:hover{


    transform:

    translateY(-8px)
    scale(1.05);


}





/* 内容卡片 */


.card{


    background:

    rgba(255,255,255,.75);


    backdrop-filter:blur(20px);


    border-radius:40px;


    padding:70px;


    margin-top:60px;


    box-shadow:

    0 30px 80px rgba(0,0,0,.08);


    animation:fade 1.2s ease;

}




.card h2{

    font-size:45px;

    margin-bottom:30px;

}



.card p{

    color:#6e6e73;

    font-size:20px;

    line-height:2;

}





footer{


    text-align:center;


    margin:100px 0 40px;


    color:#86868b;


}





/* 点击星星 */

.star{


    position:fixed;


    pointer-events:none;


    user-select:none;


    z-index:99999;


    font-size:22px;


    animation:

    sparkle .8s ease-out forwards;


}



@keyframes sparkle{


from{


opacity:1;


transform:

translate(0,0)

scale(1);


}


to{


opacity:0;


transform:

translate(var(--x),var(--y))

scale(.1)

rotate(360deg);


}


}





/* 手机适配 */


@media(max-width:600px){


.container{

padding:20px;

}



.hero{

padding:60px 0;

}



h1{

font-size:45px;

letter-spacing:8px;

}



.subtitle{

font-size:20px;

}



.avatar{

width:130px;

height:130px;

}



.card{

padding:35px;

}



.card h2{

font-size:32px;

}



.card p{

font-size:17px;

}



.nav a{

padding:15px 35px;

font-size:16px;

}


}



</style>

</head>



<body>


<div class="container">



<section class="hero">


<img

class="avatar"

src="微信图片_20251228180549_142_1.jpg"

alt="BPWMC头像">



<h1>

BPWMC

</h1>



<p class="subtitle">

Create · Record · Share

</p>



<div class="nav">


<a href="blog.html">

日志

</a>


<a href="download.html">

资源

</a>



</div>



</section>




<section class="card">


<h2>

Welcome

</h2>



<p>

欢迎来到 BPWMC 的个人空间。

</p>


<p>

记录想法，保存回忆，分享资源。

</p>



</section>





<footer>

© 2026 BPWMC

</footer>




</div>





<script>


document.addEventListener("click",function(e){


const icons=[

"✦",

"✧",

"⭐",

"✨"

];



for(let i=0;i<8;i++){



const star=document.createElement("div");


star.className="star";


star.textContent=

icons[Math.floor(Math.random()*icons.length)];



star.style.left=

e.clientX+"px";


star.style.top=

e.clientY+"px";



let angle=

Math.random()*Math.PI*2;



let distance=

30+Math.random()*70;



star.style.setProperty(

"--x",

Math.cos(angle)*distance+"px"

);



star.style.setProperty(

"--y",

Math.sin(angle)*distance+"px"

);



document.body.appendChild(star);



setTimeout(()=>{


star.remove();


},800);



}



});



</script>



</body>

</html>
